---
- name: PSQL DDL - ADD USER ADMIN
  community.postgresql.postgresql_query:
    login_host: "{{ ansible_host }}"
    login_port: "{{ psql.host.port }}"
    login_user: "{{ psql.db.user }}"
    login_password: "{{ psql.db.password }}"
    db: "{{ psql.db.name }}"
    query: "call sp_create_user_admin_role(%s, %s);"
    positional_args:
      - "{{ admin.username }}"
      - "{{ admin.password }}"
  loop: "{{ psql.user.admin }}"
  loop_control:
    loop_var: admin